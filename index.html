<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Guessing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game">
    <h1>Number Guessing Game</h1>
    <p class="help-text">
      I am thinking of a number between <strong>1</strong> and <strong>100</strong>.
      Try to guess it!
    </p>

    <label for="guessInput">Enter your guess:</label>
    <input id="guessInput" type="number" min="1" max="100" placeholder="Example: 42">

    <div class="buttons">
      <button id="checkButton">Check Guess</button>
      <button id="resetButton">New Game</button>
    </div>

    <p id="message">You have 10 tries.</p>
    <p id="tries">Tries left: 10</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
